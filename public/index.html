<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DP Lock Screen</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: radial-gradient(circle at center, #02030a, #000);
            overflow: hidden;
            color: #00e5ff;
        }

        body::after,
        body::before {
            pointer-events: none;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(180deg,
                    rgba(0, 229, 255, 0.05),
                    rgba(0, 229, 255, 0.05) 1px,
                    transparent 1px,
                    transparent 6px);
            animation: scanMove 6s linear infinite;
            pointer-events: none;
        }

        @keyframes scanMove {
            0% {
                transform: translateY(0);
            }

            100% {
                transform: translateY(40px);
            }
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, rgba(0, 229, 255, 0.2) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: floatParticles 10s linear infinite;
            opacity: 0.4;
            pointer-events: none;
        }

        @keyframes floatParticles {
            0% {
                transform: translateY(0);
            }

            100% {
                transform: translateY(-60px);
            }
        }

        .lock-screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 10;
            background: radial-gradient(circle at center, #061018, #000);
            animation: fadeIn 1.2s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(1.1);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .lock-screen::after {
            content: "";
            position: absolute;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            border: 2px solid rgba(0, 229, 255, 0.2);
            box-shadow: 0 0 20px #00e5ff, inset 0 0 40px #00e5ff;
            animation: corePulse 2.5s infinite;
            pointer-events: none;
        }

        @keyframes corePulse {
            0% {
                transform: scale(0.8) rotate(0deg);
                opacity: 0.6;
            }

            100% {
                transform: scale(1.3) rotate(180deg);
                opacity: 0;
            }
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: #00e5ff;
            top: 0;
            box-shadow: 0 0 20px #00e5ff;
            animation: scan 3s linear infinite;
            opacity: 0.6;
            pointer-events: none;
        }

        @keyframes scan {
            0% {
                top: 0;
            }

            100% {
                top: 100%;
            }
        }

        h2 {
            letter-spacing: 6px;
            text-shadow: 0 0 10px #00e5ff, 0 0 30px #0066ff;
            animation: flicker 2s infinite, glowText 3s infinite;
            z-index: 2;
        }

        @keyframes flicker {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.6;
            }
        }

        @keyframes glowText {

            0%,
            100% {
                text-shadow: 0 0 10px #00e5ff;
            }

            50% {
                text-shadow: 0 0 25px #00e5ff, 0 0 50px #0066ff;
            }
        }

        input {
            margin-top: 15px;
            padding: 12px;
            width: 250px;
            border-radius: 10px;
            border: 1px solid #00e5ff;
            background: rgba(0, 0, 0, 0.6);
            color: #00e5ff;
            text-align: center;
            z-index: 5;
        }

        button {
            margin-top: 15px;
            padding: 10px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: linear-gradient(90deg, #00e5ff, #0066ff);
            color: black;
            font-weight: bold;
            box-shadow: 0 0 20px #00e5ff;
            transition: 0.2s;
            z-index: 5;
            position: relative;
        }

        button:hover {
            transform: scale(1.1);
        }

        #lockMsg {
            margin-top: 10px;
            min-height: 20px;
            color: #ff4d4d;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0.4;
            }
        }

        .shake {
            animation: shake 0.4s;
        }

        @keyframes shake {
            0% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-10px);
            }

            50% {
                transform: translateX(10px);
            }

            75% {
                transform: translateX(-10px);
            }

            100% {
                transform: translateX(0);
            }
        }

        @media (max-width: 768px) {
            input {
                width: 80%;
            }

            button {
                width: 60%;
            }
        }

        @media (max-width: 480px) {
            input {
                width: 85%;
            }

            button {
                width: 70%;
            }
        }
    </style>
</head>

<body>

    <div id="lockScreen" class="lock-screen">
        <div class="scan-line"></div>
        <h2>DP SYSTEM LOCKED</h2>
        <p>Enter Access Code</p>
        <input id="passwordInput" type="password" placeholder="Enter password..." autocomplete="off">
        <button id="unlockBtn" type="button">UNLOCK</button>
        <p id="lockMsg"></p>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {

            let isLocked = true;

            function speak(text) {
                const msg = new SpeechSynthesisUtterance(text);
                msg.rate = 1;
                msg.pitch = 1;
                msg.lang = "en-IN";
                window.speechSynthesis.cancel();
                window.speechSynthesis.speak(msg);
            }

            function unlockSystem() {
                if (!isLocked) return;
                isLocked = false;

                const screen = document.getElementById("lockScreen");
                screen.style.transition = "opacity 0.6s ease";
                screen.style.opacity = "0.3";

                document.body.style.background = "#000";

                setTimeout(() => {
                    window.location.href = "home.html";
                }, 600);
            }

            function checkPassword() {
                const input = document.getElementById("passwordInput");
                const val = input.value.trim().toLowerCase();
                const msgBox = document.getElementById("lockMsg");

                console.log("Clicked / Entered:", val);

                if (val === "deadpool") {
                    msgBox.innerText = "ACCESS GRANTED";
                    speak("Welcome boss");

                    setTimeout(unlockSystem, 500);
                } else {
                    msgBox.innerText = "Wrong password";
                    speak("Hey Cheater You are not my boss");

                    document.getElementById("lockScreen").classList.add("shake");
                    setTimeout(() => {
                        document.getElementById("lockScreen").classList.remove("shake");
                    }, 400);
                }
            }

            document.getElementById("unlockBtn").addEventListener("click", checkPassword);

            document.getElementById("passwordInput").addEventListener("keydown", (e) => {
                if (e.key === "Enter") checkPassword();
            });

        });
    </script>

</body>

</html>
