<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DP SYSTEM — SECURE ACCESS</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --cyan: #00e5ff;
            --blue: #0057ff;
            --dark-blue: #001a33;
            --red: #ff2d55;
            --glow-cyan: 0 0 10px #00e5ff, 0 0 30px #00e5ffaa, 0 0 60px #00e5ff44;
            --glow-blue: 0 0 10px #0057ff, 0 0 30px #0057ffaa;
            --bg: #020811;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Orbitron', sans-serif;
            background: var(--bg);
            color: var(--cyan);
            overflow: hidden;
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background-image:
                linear-gradient(rgba(0, 229, 255, .06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, .06) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridDrift 20s linear infinite;
        }

        @keyframes gridDrift {
            to {
                background-position: 50px 50px;
            }
        }

        .scan {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            background: linear-gradient(transparent 50%, rgba(0, 229, 255, .015) 50%);
            background-size: 100% 4px;
            animation: scanAnim 8s linear infinite;
        }

        @keyframes scanAnim {
            to {
                background-position: 0 100%;
            }
        }

        .corner {
            position: fixed;
            width: 60px;
            height: 60px;
            z-index: 20;
            pointer-events: none;
        }

        .tl {
            top: 16px;
            left: 16px;
            border-top: 2px solid var(--cyan);
            border-left: 2px solid var(--cyan);
        }

        .tr {
            top: 16px;
            right: 16px;
            border-top: 2px solid var(--cyan);
            border-right: 2px solid var(--cyan);
        }

        .bl {
            bottom: 16px;
            left: 16px;
            border-bottom: 2px solid var(--cyan);
            border-left: 2px solid var(--cyan);
        }

        .br {
            bottom: 16px;
            right: 16px;
            border-bottom: 2px solid var(--cyan);
            border-right: 2px solid var(--cyan);
        }

        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 80px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            color: rgba(0, 229, 255, .5);
            border-bottom: 1px solid rgba(0, 229, 255, .1);
        }

        .top-bar span {
            animation: flicker 4s infinite;
        }

        @keyframes flicker {

            0%,
            100% {
                opacity: .5
            }

            50% {
                opacity: 1
            }

            92% {
                opacity: .1
            }

            94% {
                opacity: .8
            }
        }

        .lock-card {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            animation: cardIn 1.2s cubic-bezier(.16, 1, .3, 1) both;
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .reactor-wrap {
            position: relative;
            width: 200px;
            height: 200px;
            margin-bottom: 32px;
        }

        .reactor-wrap::before {
            content: '';
            position: absolute;
            inset: -30px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 229, 255, .15) 0%, transparent 70%);
            animation: reactorGlow 3s ease-in-out infinite;
        }

        @keyframes reactorGlow {

            0%,
            100% {
                opacity: .6
            }

            50% {
                opacity: 1
            }
        }

        .ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(0, 229, 255, .5);
        }

        .r1 {
            inset: 0;
            animation: rot 8s linear infinite;
            border-width: 2px;
            border-color: rgba(0, 229, 255, .8);
        }

        .r2 {
            inset: 16px;
            border-style: dashed;
            animation: rotR 12s linear infinite;
        }

        .r3 {
            inset: 32px;
            animation: rot 16s linear infinite;
            border-color: rgba(0, 87, 255, .7);
        }

        .r4 {
            inset: 48px;
            border-style: dotted;
            animation: rotR 6s linear infinite;
            border-color: rgba(0, 229, 255, .4);
        }

        @keyframes rot {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes rotR {
            to {
                transform: rotate(-360deg);
            }
        }

        .reactor-core {
            position: absolute;
            inset: 64px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 35%, #4ff7ff, #00e5ff 40%, #003566);
            box-shadow: var(--glow-cyan), inset 0 0 20px rgba(0, 229, 255, .6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 2px;
            animation: corePulse 2s ease-in-out infinite;
        }

        @keyframes corePulse {

            0%,
            100% {
                box-shadow: var(--glow-cyan), inset 0 0 20px rgba(0, 229, 255, .6);
            }

            50% {
                box-shadow: 0 0 20px #00e5ff, 0 0 60px #00e5ff, 0 0 100px #0057ff, inset 0 0 30px rgba(0, 229, 255, .8);
            }
        }

        .sys-title {
            font-size: clamp(18px, 4vw, 26px);
            font-weight: 900;
            letter-spacing: 10px;
            text-transform: uppercase;
            text-shadow: var(--glow-cyan);
            margin-bottom: 4px;
        }

        .sys-sub {
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            letter-spacing: 4px;
            color: rgba(0, 229, 255, .5);
            margin-bottom: 28px;
        }

        .input-wrap {
            position: relative;
            width: min(300px, 85vw);
            margin-bottom: 12px;
        }

        .input-wrap::before,
        .input-wrap::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            border-color: var(--cyan);
            border-style: solid;
        }

        .input-wrap::before {
            top: -1px;
            left: -1px;
            border-width: 2px 0 0 2px;
        }

        .input-wrap::after {
            bottom: -1px;
            right: -1px;
            border-width: 0 2px 2px 0;
        }

        .input-wrap input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 229, 255, .04);
            border: 1px solid rgba(0, 229, 255, .25);
            color: var(--cyan);
            font-family: 'Share Tech Mono', monospace;
            font-size: 15px;
            letter-spacing: 4px;
            text-align: center;
            outline: none;
            transition: border-color .3s, box-shadow .3s;
        }

        .input-wrap input::placeholder {
            color: rgba(0, 229, 255, .3);
            letter-spacing: 2px;
            font-size: 13px;
        }

        .input-wrap input:focus {
            border-color: var(--cyan);
            box-shadow: 0 0 20px rgba(0, 229, 255, .2), inset 0 0 10px rgba(0, 229, 255, .05);
        }

        .unlock-btn {
            position: relative;
            width: min(300px, 85vw);
            padding: 14px;
            background: transparent;
            border: 1px solid var(--cyan);
            color: var(--cyan);
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 5px;
            cursor: pointer;
            overflow: hidden;
            transition: color .3s;
        }

        .unlock-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--cyan);
            transform: translateX(-105%);
            transition: transform .4s cubic-bezier(.4, 0, .2, 1);
            z-index: 0;
        }

        .unlock-btn:hover::before {
            transform: translateX(0);
        }

        .unlock-btn:hover {
            color: #000;
            box-shadow: var(--glow-cyan);
        }

        .unlock-btn span {
            position: relative;
            z-index: 1;
        }

        #lockMsg {
            margin-top: 14px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
            letter-spacing: 3px;
            min-height: 18px;
            color: var(--red);
            text-shadow: 0 0 10px var(--red);
            animation: blink .8s infinite;
        }

        #lockMsg.ok {
            color: var(--cyan);
            text-shadow: var(--glow-cyan);
        }

        @keyframes blink {
            50% {
                opacity: .3
            }
        }

        .bottom-status {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 8px 80px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 10px;
            color: rgba(0, 229, 255, .35);
            border-top: 1px solid rgba(0, 229, 255, .08);
            z-index: 10;
        }

        .shake {
            animation: shakeAnim .4s;
        }

        @keyframes shakeAnim {

            0%,
            100% {
                transform: translateX(0)
            }

            25% {
                transform: translateX(-8px)
            }

            75% {
                transform: translateX(8px)
            }
        }

        .progress-bar {
            width: min(300px, 85vw);
            height: 2px;
            background: rgba(0, 229, 255, .1);
            margin-top: 10px;
            display: none;
        }

        .progress-bar .fill {
            height: 100%;
            width: 0;
            background: var(--cyan);
            box-shadow: 0 0 8px var(--cyan);
            transition: width .5s ease;
        }

        @media (max-width: 480px) {

            .top-bar,
            .bottom-status {
                padding: 8px 24px;
                font-size: 9px;
            }

            .corner {
                width: 40px;
                height: 40px;
            }

            .reactor-wrap {
                width: 160px;
                height: 160px;
            }

            .reactor-core {
                inset: 52px;
                font-size: 22px;
            }

            .r3 {
                inset: 26px;
            }

            .r4 {
                inset: 40px;
            }
        }
    </style>
</head>

<body>

    <div class="bg-grid"></div>
    <div class="scan"></div>

    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <div class="top-bar">
        <span>DP-SYSTEM v3.1.4</span>
        <span id="clock">--:--:--</span>
        <span>ENCRYPTION: AES-256</span>
    </div>

    <div class="lock-card" id="lockCard">
        <div class="reactor-wrap">
            <div class="ring r1"></div>
            <div class="ring r2"></div>
            <div class="ring r3"></div>
            <div class="ring r4"></div>
            <div class="reactor-core">DP</div>
        </div>

        <div class="sys-title">DP SYSTEM</div>
        <div class="sys-sub">SECURE ACCESS REQUIRED</div>

        <div class="input-wrap">
            <input id="passwordInput" type="password" placeholder="ENTER ACCESS CODE" autocomplete="off" />
        </div>

        <button class="unlock-btn" id="unlockBtn" type="button"><span>AUTHENTICATE</span></button>

        <div class="progress-bar" id="progressBar">
            <div class="fill" id="progressFill"></div>
        </div>
        <div id="lockMsg"></div>
    </div>

    <div class="bottom-status">
        <span>NEURAL CORE: ONLINE</span>
        <span id="dateStr">--/--/----</span>
        <span>THREAT LEVEL: NONE</span>
    </div>

    <script>
        // Clock
        function tick() {
            const n = new Date();
            document.getElementById('clock').textContent = n.toLocaleTimeString('en-IN', { hour12: false });
            document.getElementById('dateStr').textContent = n.toLocaleDateString('en-IN');
        }
        tick(); setInterval(tick, 1000);

        let isLocked = true;

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.rate = 1; msg.pitch = 1; msg.lang = 'en-IN';
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(msg);
        }

        function unlockSystem() {
            if (!isLocked) return;
            isLocked = false;
            const bar = document.getElementById('progressBar');
            const fill = document.getElementById('progressFill');
            bar.style.display = 'block';
            setTimeout(() => { fill.style.width = '100%'; }, 50);
            setTimeout(() => { window.location.href = 'home.html'; }, 600);
        }

        function checkPassword() {
            const input = document.getElementById('passwordInput');
            const val = input.value.trim().toLowerCase();
            const msgBox = document.getElementById('lockMsg');

            if (val === 'deadpool') {
                msgBox.textContent = '✓ ACCESS GRANTED';
                msgBox.className = 'ok';
                speak('Welcome boss');
                setTimeout(unlockSystem, 500);
            } else {
                msgBox.textContent = '✗ INVALID CREDENTIALS';
                msgBox.className = '';
                speak("Hey Cheater. You are not my boss.");
                document.getElementById('lockCard').classList.add('shake');
                setTimeout(() => document.getElementById('lockCard').classList.remove('shake'), 400);
            }
        }

        document.getElementById('unlockBtn').addEventListener('click', checkPassword);
        document.getElementById('passwordInput').addEventListener('keydown', e => { if (e.key === 'Enter') checkPassword(); });
    </script>
</body>

</html>
